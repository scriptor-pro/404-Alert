<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4@4 Logo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .logo-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animated background glow */
        .glow-bg {
            position: absolute;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.15) 0%, rgba(0, 255, 255, 0) 70%);
            border-radius: 50%;
            animation: pulse-glow 4s ease-in-out infinite;
            filter: blur(40px);
        }

        @keyframes pulse-glow {
            0%, 100% {
                opacity: 0.5;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.1);
            }
        }

        /* Geometric frame */
        .frame {
            position: absolute;
            width: 220px;
            height: 220px;
            border: 2px solid #00ffff;
            clip-path: polygon(
                10% 0%, 90% 0%, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0% 90%, 0% 10%
            );
            animation: rotate-frame 8s linear infinite;
        }

        @keyframes rotate-frame {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* Inner accent frame */
        .frame-inner {
            position: absolute;
            width: 180px;
            height: 180px;
            border: 1px solid rgba(0, 255, 255, 0.4);
            animation: rotate-frame-inner 8s linear infinite reverse;
        }

        @keyframes rotate-frame-inner {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* SVG Logo */
        .logo-svg {
            position: relative;
            z-index: 10;
            filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.6));
        }

        /* Text styling */
        .logo-text {
            font-size: 120px;
            font-weight: 900;
            letter-spacing: -8px;
            fill: #ffffff;
            font-family: 'Arial Black', sans-serif;
            text-anchor: middle;
            dominant-baseline: central;
            filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.8));
        }

        /* @ symbol styling - highlighted */
        .logo-at {
            fill: #00ffff;
            filter: drop-shadow(0 0 15px rgba(0, 255, 255, 1));
            animation: pulse-at 2s ease-in-out infinite;
        }

        @keyframes pulse-at {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }

        /* Corner accents */
        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid #00ffff;
        }

        .corner-top-left {
            top: 20px;
            left: 20px;
            border-right: none;
            border-bottom: none;
        }

        .corner-top-right {
            top: 20px;
            right: 20px;
            border-left: none;
            border-bottom: none;
        }

        .corner-bottom-left {
            bottom: 20px;
            left: 20px;
            border-right: none;
            border-top: none;
        }

        .corner-bottom-right {
            bottom: 20px;
            right: 20px;
            border-left: none;
            border-top: none;
        }

        /* Info section */
        .info {
            position: absolute;
            bottom: 40px;
            text-align: center;
            color: #00ffff;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: bold;
            opacity: 0.7;
        }

        /* Variants display */
        .variants {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            margin-top: 60px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .variant {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .variant-label {
            color: #00ffff;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .variant svg {
            width: 120px;
            height: 120px;
        }
    </style>
</head>
<body>
    <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <div class="logo-container">
            <div class="glow-bg"></div>
            <div class="frame"></div>
            <div class="frame-inner"></div>

            <svg class="logo-svg" width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <!-- Main text: 4@4 -->
                <text x="100" y="100" class="logo-text">4@4</text>

                <!-- Subtle accent line below -->
                <line x1="40" y1="140" x2="160" y2="140" stroke="#00ffff" stroke-width="2" opacity="0.6"/>
            </svg>

            <div class="corner corner-top-left"></div>
            <div class="corner corner-top-right"></div>
            <div class="corner corner-bottom-left"></div>
            <div class="corner corner-bottom-right"></div>
        </div>

        <!-- Variants Section -->
        <div class="variants">
            <div class="variant">
                <div class="variant-label">Dark Theme</div>
                <svg width="120" height="120" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <rect width="200" height="200" fill="#0a0e27"/>
                    <text x="100" y="100" class="logo-text">4@4</text>
                </svg>
            </div>

            <div class="variant">
                <div class="variant-label">Light Theme</div>
                <svg width="120" height="120" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <rect width="200" height="200" fill="#ffffff"/>
                    <text x="100" y="100" class="logo-text" fill="#0a0e27">4@4</text>
                </svg>
            </div>

            <div class="variant">
                <div class="variant-label">Gradient</div>
                <svg width="120" height="120" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ff006e;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#00ffff;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <rect width="200" height="200" fill="#0a0e27"/>
                    <text x="100" y="100" class="logo-text" fill="url(#grad)">4@4</text>
                </svg>
            </div>
        </div>
    </div>
</body>
</html>
