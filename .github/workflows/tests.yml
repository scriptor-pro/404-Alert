name: Tests PHPUnit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ["8.1", "8.2", "8.3"]
        wp-version: ["latest", "6.0"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: curl, gd, mbstring, mysqli, xmlrpc, zip
          coverage: xdebug
          tools: composer

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Setup WordPress Test Library
        run: |
          rm -rf /tmp/wordpress-test-lib /tmp/wordpress-develop-* /tmp/wp-develop.zip

          if [ "${{ matrix.wp-version }}" = "latest" ]; then
            WP_REF="trunk"
            ARCHIVE_URL="https://github.com/WordPress/wordpress-develop/archive/refs/heads/trunk.zip"
          else
            WP_REF="${{ matrix.wp-version }}"
            ARCHIVE_URL="https://github.com/WordPress/wordpress-develop/archive/refs/tags/${WP_REF}.zip"
          fi

          curl -fLsS "$ARCHIVE_URL" -o /tmp/wp-develop.zip
          unzip -q /tmp/wp-develop.zip -d /tmp

          if [ "$WP_REF" = "trunk" ]; then
            WP_PHPUNIT_DIR="/tmp/wordpress-develop-trunk/tests/phpunit"
          else
            WP_PHPUNIT_DIR="/tmp/wordpress-develop-${WP_REF}/tests/phpunit"
          fi

          test -d "$WP_PHPUNIT_DIR/includes"

          mkdir -p /tmp/wordpress-test-lib
          cp -R "$WP_PHPUNIT_DIR/"* /tmp/wordpress-test-lib/

      - name: Run PHPCS (Linting)
        run: composer run lint

      - name: Run PHPStan (Static Analysis)
        run: composer run stan

      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --coverage-clover=coverage/clover.xml
        env:
          WP_TESTS_DIR: /tmp/wordpress-test-lib

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: matrix.php-version == '8.3' && matrix.wp-version == 'latest'
        with:
          files: ./coverage/clover.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Generate coverage report
        run: |
          mkdir -p coverage
          vendor/bin/phpunit --coverage-html=coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: coverage-${{ matrix.php-version }}-${{ matrix.wp-version }}
          path: coverage/
          retention-days: 30
