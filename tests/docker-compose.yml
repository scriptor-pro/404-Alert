services:
  mysql-tests:
    image: mysql:8.0
    container_name: alert404-mysql-tests
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wordpress_test
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3307:3306"
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uwordpress",
          "-pwordpress123",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql_tests_data:/var/lib/mysql

volumes:
  mysql_tests_data:
