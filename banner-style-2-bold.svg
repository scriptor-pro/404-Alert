<?xml version="1.0" encoding="UTF-8"?>
<svg width="1544" height="500" viewBox="0 0 1544 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Bold & Vibrant Banner - Red/Orange -->
  <defs>
    <linearGradient id="bannerBoldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF4500;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="1544" height="500" fill="url(#bannerBoldGrad)"/>

  <!-- Diagonal accent stripe -->
  <polygon points="0,0 400,0 1544,500 1544,500" fill="#FFFFFF" opacity="0.1"/>

  <!-- Animated pulse circles -->
  <circle cx="1400" cy="100" r="100" fill="#FFFFFF" opacity="0.2"/>
  <circle cx="1400" cy="100" r="70" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="1400" cy="100" r="40" fill="#FFFFFF" opacity="0.4"/>

  <!-- Icon circle -->
  <circle cx="150" cy="250" r="90" fill="#FFFFFF"/>
  <text x="150" y="285" font-family="Arial, sans-serif" font-size="60" font-weight="900" text-anchor="middle" fill="#FF6B35">!</text>

  <!-- Main headline -->
  <text x="350" y="160" font-family="Arial, sans-serif" font-size="64" font-weight="900" fill="#FFFFFF">404 Alert</text>

  <!-- Subheading -->
  <text x="350" y="230" font-family="Arial, sans-serif" font-size="28" fill="#FFFFFF" font-weight="600">Never miss a broken link again</text>

  <!-- Feature badges -->
  <g>
    <!-- Badge 1 -->
    <rect x="350" y="290" width="140" height="50" rx="8" fill="#FFFFFF" opacity="0.9"/>
    <text x="420" y="325" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#FF6B35">⚡ Real-time</text>

    <!-- Badge 2 -->
    <rect x="520" y="290" width="140" height="50" rx="8" fill="#FFFFFF" opacity="0.9"/>
    <text x="590" y="325" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#FF6B35">📊 Analytics</text>

    <!-- Badge 3 -->
    <rect x="690" y="290" width="140" height="50" rx="8" fill="#FFFFFF" opacity="0.9"/>
    <text x="760" y="325" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#FF6B35">🔔 Alerts</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="450" width="1544" height="50" fill="#FFFFFF" opacity="0.15"/>
  <text x="1544" y="485" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="end" opacity="0.8">Version 1.1.0</text>
</svg>