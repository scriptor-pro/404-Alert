<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Hybrid Modern - Deep Blue with Orange accent (alert + trust) -->
  <defs>
    <linearGradient id="hybridGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c4a6e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main background -->
  <circle cx="64" cy="64" r="60" fill="url(#hybridGradient)"/>

  <!-- Light overlay circle -->
  <circle cx="64" cy="64" r="50" fill="#FFFFFF" opacity="0.08"/>

  <!-- Shield shape (security/solution) -->
  <g transform="translate(64, 55)">
    <path d="M 0 -15 L 15 -5 L 15 10 Q 0 20 0 20 Q -15 20 -15 10 L -15 -5 Z" fill="#FF6B35" stroke="#FFFFFF" stroke-width="1.5" opacity="0.9"/>
    <!-- Check mark inside shield -->
    <path d="M -8 5 L -2 10 L 8 0" stroke="#1e3a8a" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 404 text - clean and modern -->
  <text x="64" y="100" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#FFFFFF">404 ALERT</text>
</svg>