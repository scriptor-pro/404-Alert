<?xml version="1.0" encoding="UTF-8"?>
<svg width="1544" height="500" viewBox="0 0 1544 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Professional & Classic Banner - Black/Gray -->
  <defs>
    <linearGradient id="bannerProfGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F5F5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1544" height="500" fill="url(#bannerProfGrad)"/>

  <!-- Left border accent -->
  <rect x="0" y="0" width="8" height="500" fill="#333333"/>

  <!-- Professional border elements -->
  <line x1="0" y1="60" x2="1544" y2="60" stroke="#CCCCCC" stroke-width="1"/>
  <line x1="0" y1="440" x2="1544" y2="440" stroke="#CCCCCC" stroke-width="1"/>

  <!-- Left icon area -->
  <g transform="translate(120, 250)">
    <rect x="-70" y="-70" width="140" height="140" rx="4" fill="#F5F5F5" stroke="#999999" stroke-width="2"/>
    <text x="0" y="20" font-family="Georgia, serif" font-size="56" font-weight="bold" text-anchor="middle" fill="#333333">404</text>
    <line x1="-50" y1="35" x2="50" y2="35" stroke="#999999" stroke-width="1"/>
  </g>

  <!-- Main content -->
  <g transform="translate(350, 150)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="56" font-weight="bold" fill="#333333">404 Alert</text>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="20" fill="#666666">Intelligent monitoring for WordPress websites</text>
    <text x="0" y="85" font-family="Arial, sans-serif" font-size="14" fill="#999999">Real-time notifications • Analytics • Security</text>
  </g>

  <!-- Right side - feature list -->
  <g transform="translate(1050, 200)">
    <!-- Feature 1 -->
    <rect x="0" y="0" width="2" height="30" fill="#333333"/>
    <text x="15" y="22" font-family="Arial, sans-serif" font-size="13" fill="#333333">Email Notifications</text>

    <!-- Feature 2 -->
    <rect x="0" y="50" width="2" height="30" fill="#333333"/>
    <text x="15" y="72" font-family="Arial, sans-serif" font-size="13" fill="#333333">Admin Dashboard</text>

    <!-- Feature 3 -->
    <rect x="0" y="100" width="2" height="30" fill="#333333"/>
    <text x="15" y="122" font-family="Arial, sans-serif" font-size="13" fill="#333333">SMTP Support</text>
  </g>

  <!-- Footer -->
  <text x="1500" y="480" font-family="Arial, sans-serif" font-size="12" fill="#999999" text-anchor="end">Version 1.1.0 • Production Ready</text>
</svg>