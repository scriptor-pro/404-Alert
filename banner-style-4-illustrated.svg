<?xml version="1.0" encoding="UTF-8"?>
<svg width="1544" height="500" viewBox="0 0 1544 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Illustrated & Friendly Banner - Green/Teal -->
  <defs>
    <linearGradient id="bannerIllustGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1AB394;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16A085;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1544" height="500" fill="url(#bannerIllustGrad)"/>

  <!-- Decorative light circles -->
  <circle cx="200" cy="500" r="200" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="1400" cy="0" r="250" fill="#FFFFFF" opacity="0.08"/>

  <!-- Character illustration - left -->
  <g transform="translate(150, 200)">
    <!-- Body -->
    <rect x="-40" y="20" width="80" height="80" rx="8" fill="#FFFFFF" stroke="#1AB394" stroke-width="2"/>
    <!-- Head -->
    <circle cx="0" cy="-20" r="35" fill="#FFFFFF" stroke="#1AB394" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="-12" cy="-25" r="6" fill="#1AB394"/>
    <circle cx="12" cy="-25" r="6" fill="#1AB394"/>
    <!-- Smile -->
    <path d="M -15 -10 Q 0 0 15 -10" stroke="#1AB394" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Hands pointing -->
    <circle cx="-50" cy="40" r="8" fill="#FFFFFF" stroke="#1AB394" stroke-width="2"/>
    <circle cx="50" cy="40" r="8" fill="#FFFFFF" stroke="#1AB394" stroke-width="2"/>
  </g>

  <!-- Main message -->
  <text x="380" y="140" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#FFFFFF">404 Alert</text>

  <!-- Subheading -->
  <text x="380" y="210" font-family="Arial, sans-serif" font-size="26" fill="#FFFFFF" opacity="0.95">Keep your site running smoothly</text>
  <text x="380" y="250" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" opacity="0.85">Detect and fix broken links before your visitors do</text>

  <!-- Benefit boxes -->
  <g>
    <!-- Box 1 -->
    <rect x="380" y="300" width="180" height="100" rx="8" fill="#FFFFFF" opacity="0.2" stroke="#FFFFFF" stroke-width="2"/>
    <text x="470" y="330" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#FFFFFF">⚡</text>
    <text x="470" y="365" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#FFFFFF">Real-time Alerts</text>

    <!-- Box 2 -->
    <rect x="620" y="300" width="180" height="100" rx="8" fill="#FFFFFF" opacity="0.2" stroke="#FFFFFF" stroke-width="2"/>
    <text x="710" y="330" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#FFFFFF">📊</text>
    <text x="710" y="365" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#FFFFFF">Analytics</text>

    <!-- Box 3 -->
    <rect x="860" y="300" width="180" height="100" rx="8" fill="#FFFFFF" opacity="0.2" stroke="#FFFFFF" stroke-width="2"/>
    <text x="950" y="330" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#FFFFFF">🔔</text>
    <text x="950" y="365" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#FFFFFF">Notifications</text>
  </g>

  <!-- Version tag -->
  <text x="1500" y="480" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" opacity="0.7" text-anchor="end">v1.1.0</text>
</svg>