<?xml version="1.0" encoding="UTF-8"?>
<svg width="1544" height="500" viewBox="0 0 1544 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Modern Minimalist Banner - Blue/Cyan -->
  <defs>
    <linearGradient id="bannerModernGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D0E8FF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1544" height="500" fill="url(#bannerModernGrad)"/>

  <!-- Decorative circles - top right -->
  <circle cx="1300" cy="80" r="120" fill="#0066CC" opacity="0.1"/>
  <circle cx="1400" cy="150" r="80" fill="#00D9FF" opacity="0.15"/>

  <!-- Decorative lines -->
  <line x1="0" y1="450" x2="1544" y2="450" stroke="#0066CC" stroke-width="3" opacity="0.3"/>
  <path d="M 0 400 Q 386 380 772 400 T 1544 400" stroke="#00D9FF" stroke-width="2" fill="none" opacity="0.2"/>

  <!-- Icon/Logo area - left side -->
  <circle cx="150" cy="250" r="90" fill="#FFFFFF" stroke="#0066CC" stroke-width="2"/>
  <text x="150" y="265" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#0066CC">404</text>

  <!-- Main text -->
  <text x="350" y="180" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#0066CC">404 Alert</text>
  <text x="350" y="230" font-family="Arial, sans-serif" font-size="24" fill="#0066CC" opacity="0.8">Monitor and respond to 404 errors instantly</text>

  <!-- Features list - right side -->
  <g transform="translate(1000, 200)">
    <circle cx="0" cy="0" r="5" fill="#00D9FF"/>
    <text x="20" y="6" font-family="Arial, sans-serif" font-size="16" fill="#0066CC">Email Notifications</text>

    <circle cx="0" cy="50" r="5" fill="#00D9FF"/>
    <text x="20" y="56" font-family="Arial, sans-serif" font-size="16" fill="#0066CC">Rate Limiting</text>

    <circle cx="0" cy="100" r="5" fill="#00D9FF"/>
    <text x="20" y="106" font-family="Arial, sans-serif" font-size="16" fill="#0066CC">Analytics Dashboard</text>
  </g>

  <!-- Version info -->
  <text x="350" y="420" font-family="Arial, sans-serif" font-size="14" fill="#0066CC" opacity="0.6">Version 1.1.0 • Production Ready</text>
</svg>