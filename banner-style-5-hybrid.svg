<?xml version="1.0" encoding="UTF-8"?>
<svg width="1544" height="500" viewBox="0 0 1544 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Hybrid Modern Banner - Deep Blue with Orange accent -->
  <defs>
    <linearGradient id="bannerHybridGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c4a6e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1544" height="500" fill="url(#bannerHybridGrad)"/>

  <!-- Geometric accent shapes - top right -->
  <rect x="1200" y="30" width="150" height="150" fill="#FF6B35" opacity="0.15" transform="rotate(45 1275 105)"/>
  <rect x="1350" y="80" width="100" height="100" fill="#FF6B35" opacity="0.1" transform="rotate(30 1400 130)"/>

  <!-- Left icon area with shield -->
  <g transform="translate(150, 250)">
    <!-- Shield outline -->
    <path d="M 0 -50 L 60 -20 L 60 30 Q 0 70 0 70 Q -60 70 -60 30 L -60 -20 Z" fill="#FF6B35" stroke="#FFFFFF" stroke-width="2"/>
    <!-- Check mark -->
    <path d="M -25 10 L -10 25 L 30 -5" stroke="#1e3a8a" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Main headline -->
  <text x="350" y="140" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#FFFFFF">404 Alert</text>

  <!-- Accent line under headline -->
  <line x1="350" y1="160" x2="600" y2="160" stroke="#FF6B35" stroke-width="4"/>

  <!-- Subheading -->
  <text x="350" y="230" font-family="Arial, sans-serif" font-size="22" fill="#FFFFFF" opacity="0.95">Monitor 404 errors and notify instantly</text>

  <!-- Key stats -->
  <g transform="translate(350, 310)">
    <!-- Stat 1 -->
    <g>
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FF6B35">110+</text>
      <text x="0" y="25" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" opacity="0.8">Unit Tests</text>
    </g>

    <!-- Stat 2 -->
    <g transform="translate(150, 0)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FF6B35">85-90%</text>
      <text x="0" y="25" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" opacity="0.8">Code Coverage</text>
    </g>

    <!-- Stat 3 -->
    <g transform="translate(300, 0)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FF6B35">0</text>
      <text x="0" y="25" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" opacity="0.8">Security Issues</text>
    </g>
  </g>

  <!-- Right side - feature highlights -->
  <g transform="translate(1100, 180)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#FF6B35" font-weight="bold">FEATURES</text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">✓ Real-time Alerts</text>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">✓ SMTP Support</text>
    <text x="0" y="85" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">✓ Redis Optimized</text>
    <text x="0" y="110" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">✓ Production Ready</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="460" width="1544" height="40" fill="#FF6B35" opacity="0.2"/>
  <text x="1500" y="485" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" text-anchor="end" opacity="0.8">Version 1.1.0 • Fully Tested • WordPress.org Ready</text>
</svg>