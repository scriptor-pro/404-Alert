<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Bold & Vibrant - Red/Orange -->
  <!-- Background with gradient effect -->
  <defs>
    <linearGradient id="boldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF4500;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main circle -->
  <circle cx="64" cy="64" r="60" fill="url(#boldGradient)"/>

  <!-- Exclamation mark (alert symbol) -->
  <g transform="translate(64, 64)">
    <circle cx="0" cy="-12" r="6" fill="#FFFFFF"/>
    <rect x="-4" y="-2" width="8" height="14" rx="2" fill="#FFFFFF"/>
  </g>

  <!-- 404 text overlay -->
  <text x="64" y="45" font-family="Arial, sans-serif" font-size="28" font-weight="900" text-anchor="middle" fill="#FFFFFF" opacity="0.9">404</text>

  <!-- Notification badge -->
  <circle cx="100" cy="28" r="12" fill="#FFFF00" stroke="#FFFFFF" stroke-width="2"/>
  <text x="100" y="33" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#FF6B35">!</text>
</svg>