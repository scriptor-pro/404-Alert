<svg width="772" height="250" viewBox="0 0 772 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Clean white background (Bauhaus core principle) -->
  <rect width="772" height="250" fill="#ffffff"/>

  <!-- Large black vertical block (left side) - bold geometric statement -->
  <rect x="0" y="0" width="180" height="250" fill="#1a1f3a"/>

  <!-- Yellow accent bar (Bauhaus primary color) -->
  <rect x="180" y="0" width="8" height="250" fill="#FFD700"/>

  <!-- Icon area - mailbox on black block -->
  <g>
    <!-- Mailbox body -->
    <rect x="35" y="85" width="50" height="35" rx="6" fill="none" stroke="#ffffff" stroke-width="2"/>

    <!-- Mailbox door -->
    <path d="M 42 105 Q 42 92 48 92 L 70 92 Q 76 92 76 105" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>

    <!-- Door handle - yellow accent -->
    <circle cx="72" cy="99" r="2.5" fill="#FFD700"/>

    <!-- Flag post -->
    <rect x="78" y="99" width="2.5" height="12" fill="#ffffff"/>

    <!-- Flag - yellow -->
    <rect x="80.5" y="99" width="10" height="7" fill="#FFD700" stroke="#ffffff" stroke-width="1"/>

    <!-- 4@4 text above mailbox -->
    <text x="60" y="75" font-family="'Futura', 'Verdana', sans-serif" font-size="20" font-weight="900" text-anchor="middle" fill="#ffffff" letter-spacing="-0.5">4@4</text>

    <!-- Horizontal line divider -->
    <line x1="35" y1="135" x2="90" y2="135" stroke="#FFD700" stroke-width="1.5"/>
  </g>

  <!-- Text content area - right side (clean, minimal) -->
  <g>
    <!-- Main heading: 404 Alert -->
    <text x="210" y="85" font-family="'Futura', 'Verdana', sans-serif" font-size="52" font-weight="900" text-anchor="start" fill="#1a1f3a" letter-spacing="-1">404 Alert</text>

    <!-- Dividing line under heading -->
    <line x1="210" y1="100" x2="340" y2="100" stroke="#FFD700" stroke-width="3"/>

    <!-- Tagline -->
    <text x="210" y="145" font-family="'Futura', 'Verdana', sans-serif" font-size="16" font-weight="300" text-anchor="start" fill="#1a1f3a" letter-spacing="0.5">Receive email alerts on 404 errors</text>

    <!-- Description (functional text) -->
    <text x="210" y="175" font-family="'Futura', 'Verdana', sans-serif" font-size="12" font-weight="400" text-anchor="start" fill="#666666" letter-spacing="0.2">Get notified instantly • Fix broken links faster</text>
    <text x="210" y="195" font-family="'Futura', 'Verdana', sans-serif" font-size="12" font-weight="400" text-anchor="start" fill="#666666" letter-spacing="0.2">Monitor 404 errors • Stay informed</text>

    <!-- Functional accent squares (Bauhaus grid principle) -->
    <rect x="210" y="215" width="6" height="6" fill="#1a1f3a"/>
    <rect x="224" y="215" width="6" height="6" fill="#FFD700"/>
    <rect x="238" y="215" width="6" height="6" fill="#1a1f3a"/>
  </g>

  <!-- Right side accent (geometric balance) -->
  <rect x="764" y="0" width="8" height="250" fill="#FFD700"/>

  <!-- Geometric corner accents (Bauhaus severity) -->
  <rect x="188" y="10" width="4" height="16" fill="#1a1f3a"/>
  <rect x="188" y="224" width="4" height="16" fill="#1a1f3a"/>
</svg>
